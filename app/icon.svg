<svg viewBox="0 0 330 330" xmlns="http://www.w3.org/2000/svg">
  <!--
    YUKUE favicon — symbol mark only (magnifying glass + ¥ + gold arrow)
    Content bounding box (with stroke widths):
      x: ~1 (handle tip) to ~302 (arrowhead) → width ~301
      y: ~10 (arrowhead) to ~225 (handle tip + half stroke) → height ~215
    Centered in 330×330 with translate(8, 53)
  -->
  <g transform="translate(8, 53)">
    <!-- Magnifying glass circle -->
    <circle cx="112" cy="106" r="78"
      fill="none" stroke="#1a365d" stroke-width="14" stroke-linecap="round"/>

    <!-- ¥ mark: two diagonal lines forming the Y shape -->
    <line x1="70"  y1="62"  x2="112" y2="98"
      stroke="#1a365d" stroke-width="12" stroke-linecap="round"/>
    <line x1="154" y1="62"  x2="112" y2="98"
      stroke="#1a365d" stroke-width="12" stroke-linecap="round"/>

    <!-- ¥ mark: vertical stem -->
    <line x1="112" y1="98"  x2="112" y2="154"
      stroke="#1a365d" stroke-width="12" stroke-linecap="round"/>

    <!-- ¥ mark: two horizontal bars -->
    <line x1="82"  y1="120" x2="142" y2="120"
      stroke="#1a365d" stroke-width="8"  stroke-linecap="round"/>
    <line x1="82"  y1="134" x2="142" y2="134"
      stroke="#1a365d" stroke-width="8"  stroke-linecap="round"/>

    <!-- Handle (lower-left diagonal) -->
    <line x1="62"  y1="164" x2="12"  y2="214"
      stroke="#1a365d" stroke-width="22" stroke-linecap="round"/>

    <!-- Gold dashed curved arrow path -->
    <path d="M 184,84 C 220,51 260,26 298,14"
      fill="none" stroke="#f0a800" stroke-width="9"
      stroke-dasharray="13 8" stroke-linecap="round"/>

    <!-- Gold arrowhead -->
    <polygon points="302,10 286,28 274,16" fill="#f0a800"/>
  </g>
</svg>
